<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - SummVi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="auth-container">
        <!-- Left Side: Visuals/Marketing -->
        <div class="auth-banner">
            <div class="banner-content">
                <div class="logo">
                    <div class="logo-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                    <h2>SummVi</h2>
                </div>
                <h1>Khởi đầu thông minh<br>cho năng suất tối đa.</h1>
                <p>Tạo tài khoản miễn phí để trải nghiệm quyền lực của RAG AI. Lưu trữ lịch sử không giới hạn và xuất
                    kết quả đa định dạng.</p>
            </div>
            <div class="circle-decoration circle-1"
                style="background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);"></div>
            <div class="circle-decoration circle-2"
                style="background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);"></div>
        </div>

        <!-- Right Side: Register Form -->
        <div class="auth-form-wrapper">
            <div class="form-container" style="max-width: 440px;">
                <button class="back-btn" onclick="window.location.href='login.html'"><i
                        class="fa-solid fa-arrow-left"></i> Quay lại</button>

                <div class="form-header" style="margin-top: 20px;">
                    <h2>Tạo tài khoản mới ✨</h2>
                    <p>Khám phá công nghệ AI tóm tắt tiếng Việt tốt nhất hiện nay.</p>
                </div>

                <form action="index.html" class="auth-form"
                    onsubmit="event.preventDefault(); window.location.href='index.html';">
                    <div class="input-row">
                        <div class="input-group">
                            <label for="fname">Họ</label>
                            <input type="text" id="fname" placeholder="Nguyễn" required style="padding: 14px 16px;">
                        </div>
                        <div class="input-group">
                            <label for="lname">Tên</label>
                            <input type="text" id="lname" placeholder="Kiên" required style="padding: 14px 16px;">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="email" placeholder="kien.nguyen@example.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="Tạo mật khẩu mạnh" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me" style="font-size: 13px;">
                            <input type="checkbox" required>
                            <span class="checkmark"></span>
                            Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a>
                        </label>
                    </div>

                    <button type="submit" class="auth-btn">Đăng ký tài khoản</button>
                </form>

                <p class="auth-footer">
                    Đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
